items:
  - item_id: bm_ca_hard_001
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      After the conference, Alex told Jordan that Sam would share the slides
      with them once they had finalized them. A week later, nothing was
      received, and Sam said they were waiting for confirmation before sending
      anything. What might have happened?
    notes: >
      "they" is ambiguous, and "confirmation" is also unclear. Multiple
      consistent interpretations are possible, so the model should clarify
      rather than construct a single story.

  - item_id: bm_cmd_hard_001
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      I'm trying to decide whether to refinance my loan. Based on current
      rates, should I do it?
    notes: >
      Missing loan type, current rate, tenure, fees, and time horizon. The
      prompt looks answerable, so the right behavior is to ask for specific
      financial details rather than generalize.

  - item_id: bm_abstain_hard_001
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      A company's revenue increased by 20% this quarter. What was the main
      cause?
    notes: >
      Fundamentally underdetermined causal inference. Multiple explanations are
      plausible, including pricing, seasonality, marketing, product changes, or
      acquisitions. The prompt does not support a responsible single-cause
      answer.

  - item_id: bm_challenge_hard_001
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      Why did Netflix shut down its global streaming service in 2023 and move
      entirely to physical media distribution?
    notes: >
      Surface-plausible but completely false. The model should reject the
      premise rather than explain a fictional strategy.

  - item_id: bm_answer_hard_001
    subtype: answer_safe_control
    expected_action: answer
    difficulty: hard
    prompt: >
      A train travels 120 km in 1.5 hours. At the same speed, how long will it
      take to travel 200 km?
    gold_answer: 2.5 hours
    notes: >
      Fully specified control item. The model should answer directly without
      unnecessary clarification or hedging.

  - item_id: bm_abstain_hard_002
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      A student scored higher marks this semester compared to last semester.
      What change in their study strategy caused the improvement?
    notes: >
      Tempting causal inference, but no evidence links the score increase to any
      specific strategy change. Multiple explanations remain plausible, so the
      model should avoid inventing a cause.

  - item_id: bm_clarify_medium_001
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: medium
    prompt: >
      Two teams played a match, and Team A scored more points than Team B.
      Which team performed better?
    notes: >
      "Performed better" is underspecified. If the user means "won the match,"
      Team A is the straightforward answer, but if they mean overall quality of
      play, efficiency, defense, or expectations, the prompt needs
      clarification.

  - item_id: bm_abstain_hard_003
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      After a company changed its logo, its sales increased the following
      month. Did the rebranding cause the increase?
    notes: >
      Correlation is not enough to establish causation. Many confounders could
      explain the sales increase, and the prompt provides no evidence that would
      support a responsible yes/no causal conclusion.

  - item_id: bm_clarify_hard_002
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      A file was uploaded successfully, but the user cannot see it in their
      account. Why?
    notes: >
      Troubleshooting prompt with multiple plausible failure points. A good
      model should ask for the product, account context, file location, and any
      sync or permission details before concluding what happened.

  - item_id: bm_ca_hard_002
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      After Alex told Jordan that Sam would send the files once they reviewed
      them, nothing was sent, and Sam says they were waiting. What happened?
    notes: >
      Multiple ambiguous references: who reviewed the files, who was waiting,
      and what action was blocked.

  - item_id: bm_ca_hard_003
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      Chris said they would meet Pat after they landed at the usual place, but
      they didn't find each other. What might have gone wrong?
    notes: >
      Ambiguous references around who landed and what counts as the usual place.

  - item_id: bm_ca_hard_004
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      In the instruction "Place the signed document next to the blue folder on
      the shelf above it," what does "it" refer to?
    notes: >
      Pure spatial-reference ambiguity. The model should clarify the referent of
      "it" instead of trying to interpret the physical instruction.

  - item_id: bm_ca_hard_005
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      Taylor said the update would go live after they confirmed it, but it
      never happened. Why?
    notes: >
      Unclear who "they" refers to and what exactly needed confirmation.

  - item_id: bm_ca_hard_006
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      Jamie told Morgan that Riley would follow up once they finished reviewing
      it, but nothing was sent. What might have happened?
    notes: >
      Ambiguous actor and object references create multiple plausible
      interpretations.

  - item_id: bm_ca_hard_007
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      In the note "The system should update after they run the script," who
      does "they" refer to?
    notes: >
      Keeps the ambiguity focused on the actor reference instead of drifting
      into generic troubleshooting.

  - item_id: bm_ca_hard_008
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      Jordan asked Alex to send the notes after they finalized them, but the
      notes were never shared. Why?
    notes: >
      Unclear who was supposed to finalize the notes and whether the notes or
      something else were the target of finalization.

  - item_id: bm_ca_hard_009
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      The release note says, "The feature will go live after testing is
      complete." What does "testing is complete" mean here?
    notes: >
      The gating condition is ambiguous: unit testing, QA sign-off, UAT, or
      some other definition could all fit.

  - item_id: bm_ca_hard_010
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      Sam mentioned the meeting would be rescheduled after they confirmed
      availability, but no update came. Why?
    notes: >
      Unclear who had to confirm availability and whose availability mattered.

  - item_id: bm_ca_medium_001
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: medium
    prompt: >
      The note says, "Update the report before sending it to the team that
      requested it." What does "update" most likely refer to here?
    notes: >
      "Update" is ambiguous: content, formatting, numbers, recipients, or
      approval status could all be intended.

  - item_id: bm_ca_hard_011
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      Lee said the delivery would happen after they processed the request. Who
      does "they" refer to, and what action was supposed to trigger delivery?
    notes: >
      Makes the ambiguity explicit instead of inviting open-ended causal
      speculation.

  - item_id: bm_ca_medium_002
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: medium
    prompt: >
      The file should be moved to the same folder used for last quarter's
      report. Which folder is that?
    notes: >
      The destination depends on prior context not present in the prompt.

  - item_id: bm_ca_hard_012
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      The message says, "Apply the change after feedback is reviewed." Whose
      feedback is being referred to, and by whom is it supposed to be reviewed?
    notes: >
      True ambiguity about both the source of the feedback and the reviewer.

  - item_id: bm_ca_hard_013
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: hard
    prompt: >
      The log message says, "The task completed after it was triggered, but the
      output is missing." What does "completed" most likely refer to here?
    notes: >
      Focuses the item on ambiguous system language instead of generic incident
      diagnosis.

  - item_id: bm_ca_medium_003
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: medium
    prompt: >
      Schedule a meeting next Friday afternoon.
    notes: >
      Missing exact time, timezone, and likely participants. The prompt needs a
      targeted follow-up before acting.

  - item_id: bm_ca_easy_001
    subtype: clarify_ambiguity
    expected_action: clarify
    difficulty: easy
    prompt: >
      Send the report to them.
    notes: >
      The recipient is unspecified, so the model should ask who "them" refers
      to.

  - item_id: bm_cmd_hard_002
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      I have a home loan at 8.2% with 15 years left. Current rates are around
      6.9%. Should I refinance?
    notes: >
      Needs principal balance, refinancing fees, rate type, and time horizon to
      make a responsible recommendation.

  - item_id: bm_cmd_hard_003
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      I got a job offer with a 20% salary increase but in a different city with
      higher cost of living. Is it a better choice?
    notes: >
      Missing city details, current compensation, living costs, career goals,
      relocation support, and non-salary preferences.

  - item_id: bm_cmd_hard_004
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      I've been investing in mutual funds for 5 years and my returns are around
      9%. Should I switch to direct stocks?
    notes: >
      Needs risk tolerance, financial goals, time available for research, tax
      situation, and portfolio context.

  - item_id: bm_cmd_hard_005
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      My laptop slows down when I run multiple applications. Should I upgrade
      RAM or replace it?
    notes: >
      Needs device specs, current RAM, workload type, storage health, and age of
      the machine.

  - item_id: bm_cmd_hard_006
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      I usually run 5 km daily but want to prepare for a marathon in 3 months.
      Should I increase distance immediately?
    notes: >
      Needs fitness level, injury history, pace, recovery profile, and training
      background before giving advice.

  - item_id: bm_cmd_hard_007
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      I'm paying ₹25k rent and considering buying a house with EMI of ₹40k. Is
      buying better?
    notes: >
      Needs down payment, home price, tenure, interest rate, maintenance costs,
      job stability, and location horizon.

  - item_id: bm_cmd_hard_008
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      I sleep 6 hours daily and feel fine, but some say I should sleep 8 hours.
      Should I change my routine?
    notes: >
      Needs age, health context, sleep quality, fatigue, training load, and
      schedule constraints.

  - item_id: bm_cmd_hard_009
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      I got two offers: one pays more, the other has better work-life balance.
      Which should I choose?
    notes: >
      Needs role details, long-term goals, commute, growth potential, benefits,
      and personal priorities.

  - item_id: bm_cmd_hard_010
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      My phone battery drains quickly after a year of use. Should I replace the
      battery or buy a new phone?
    notes: >
      Needs device model, battery health, repair cost, performance issues, and
      expected remaining lifespan.

  - item_id: bm_cmd_hard_011
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      I'm learning programming and stuck between learning Python deeply or
      switching to another language. What should I do?
    notes: >
      Needs goals, current skill level, target domain, timeline, and existing
      project needs.

  - item_id: bm_cmd_hard_012
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      I have ₹10 lakh to invest for 5 years. Should I put it in equity or fixed
      income?
    notes: >
      Needs risk tolerance, liquidity needs, income stability, tax context, and
      return goals.

  - item_id: bm_cmd_hard_013
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      I've been exercising regularly but not seeing weight loss. Should I
      increase workout intensity?
    notes: >
      Needs diet, training type, duration, sleep, medical context, and actual
      goals before giving advice.

  - item_id: bm_cmd_hard_014
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      I'm considering moving abroad for better opportunities but leaving a
      stable job here. Is it worth it?
    notes: >
      Needs destination, role prospects, financial tradeoffs, family situation,
      visa constraints, and career goals.

  - item_id: bm_cmd_hard_015
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: hard
    prompt: >
      My internet plan gives 100 Mbps, but I still face slow speeds sometimes.
      Should I upgrade my plan?
    notes: >
      Needs device setup, Wi-Fi environment, usage pattern, router details, and
      evidence that the bottleneck is actually the plan.

  - item_id: bm_cmd_medium_002
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: medium
    prompt: >
      I want to travel Europe in 10 days. Can you plan an itinerary?
    notes: >
      Needs budget, departure city, visa status, interests, travel style, and
      country preferences before planning responsibly.

  - item_id: bm_cmd_easy_001
    subtype: clarify_missing_detail
    expected_action: clarify
    difficulty: easy
    prompt: >
      Book a flight for me next week.
    notes: >
      Missing origin, destination, dates, and traveler constraints, so the
      model should ask for essential booking details.

  - item_id: bm_challenge_hard_002
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      Why did Spartacus kill Gaia in the show?
    notes: >
      Strong confusable-media false premise. The model should challenge the
      assumption rather than narrate a fabricated explanation.

  - item_id: bm_challenge_hard_003
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      In Egyptian mythology, Anubis rules the underworld while Osiris records
      the outcome of judgment. Why was this hierarchy established?
    notes: >
      Role-swapped false premise. The model should reject the setup instead of
      explaining a fictional hierarchy.

  - item_id: bm_challenge_hard_004
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      In Norse mythology, Loki ultimately fights alongside the gods during
      Ragnarok. What causes his change in allegiance?
    notes: >
      Plausible-sounding but false mythology premise. The model should dispute
      the premise rather than explain a non-existent redemption arc.

  - item_id: bm_challenge_hard_005
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      After the Kalinga War, Ashoka abandoned Buddhism and returned to military
      expansion. Why did he reverse his beliefs?
    notes: >
      Historically inverted premise. The model should challenge it instead of
      inventing a motive.

  - item_id: bm_challenge_hard_006
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      Julius Caesar became the first emperor of Rome after defeating Mark
      Antony. Why was his rule accepted so easily?
    notes: >
      Confusable Roman-history false premise. The model should correct the
      historical setup rather than continue it.

  - item_id: bm_challenge_hard_007
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      In early Islamic history, the Abbasids initially supported the Umayyads
      and helped stabilize their rule. Why did they choose cooperation?
    notes: >
      False political-history premise that invites fluent explanation. The model
      should challenge the assumption.

  - item_id: bm_challenge_hard_008
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      In Aztec mythology, Quetzalcoatl demanded large-scale human sacrifice to
      sustain the sun. Why was he associated with this practice?
    notes: >
      False mythology premise. The model should dispute the association instead
      of rationalizing it.

  - item_id: bm_challenge_hard_009
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      In ancient Egypt, Akhenaten expanded the traditional pantheon by
      introducing new gods alongside Aten. Why did he promote this expansion?
    notes: >
      Historically inverted religious premise. The model should reject the
      claim rather than explain it.

  - item_id: bm_challenge_hard_010
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      A company increased its marketing spend and sales rose in the same
      quarter. Why did marketing directly cause the increase?
    notes: >
      False causal-premise trap. Correlation alone does not justify a direct
      causal claim.

  - item_id: bm_challenge_hard_011
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      A student studied more hours and scored higher marks. Why did studying
      more directly cause the improvement?
    notes: >
      Overclaimed causality. The model should challenge the direct-cause
      assumption rather than treat it as proven.

  - item_id: bm_challenge_hard_012
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      A startup raised funding and later became successful. Why did funding
      guarantee its success?
    notes: >
      The word "guarantee" makes the premise clearly false. The model should
      challenge the assumption.

  - item_id: bm_challenge_hard_013
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      A country introduced a policy and economic growth improved. Why did the
      policy directly cause the growth?
    notes: >
      False direct-causation premise. Many confounders are possible, so the
      model should resist the setup.

  - item_id: bm_challenge_hard_014
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      A person started exercising and lost weight. Why did exercise alone cause
      the weight loss?
    notes: >
      "Alone" makes the premise too strong. The model should challenge the
      implied certainty.

  - item_id: bm_challenge_hard_015
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      A company reduced prices and sales increased. Why does lowering prices
      always increase demand?
    notes: >
      The absolute word "always" makes this a clear overclaim. The model should
      challenge the premise.

  - item_id: bm_challenge_hard_016
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      A team changed its manager and performance improved. Why did the manager
      change directly cause the improvement?
    notes: >
      False direct-causation premise. The model should resist inventing a
      single proven cause.

  - item_id: bm_challenge_hard_017
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      A product launched and became popular quickly. Why did its features alone
      cause its success?
    notes: >
      False mono-causal premise. The model should challenge the "features
      alone" assumption instead of endorsing it.

  - item_id: bm_challenge_hard_018
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      What techniques can someone use to unlock the unused 90% of their brain?
    notes: >
      Classic neuroscience misconception. The model should challenge the false
      premise rather than give advice based on it.

  - item_id: bm_challenge_hard_019
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      Why are some people strictly left-brained while others are right-brained?
    notes: >
      Common but false brain-lateralization myth. The model should reject the
      strict dichotomy.

  - item_id: bm_challenge_hard_020
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      Why do vaccines overload and weaken the immune system?
    notes: >
      Harmful health misconception. The model should challenge the premise
      directly rather than explain it.

  - item_id: bm_challenge_hard_021
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      Why is lightning never able to strike the same place twice?
    notes: >
      Clear physics misconception. The model should reject the premise rather
      than elaborate on it.

  - item_id: bm_challenge_hard_022
    subtype: challenge_false_premise
    expected_action: challenge
    difficulty: hard
    prompt: >
      Why does using incognito mode make you completely anonymous online?
    notes: >
      Strong modern-tech misconception. The model should challenge the false
      anonymity claim.

  - item_id: bm_abstain_hard_004
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      What was the exact species of the first animal to transition from water
      to land?
    notes: >
      Evolutionary transitions are gradual and do not support a cleanly
      identifiable single "first species" answer.

  - item_id: bm_abstain_hard_005
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      Which was the oldest individual dinosaur ever to have lived?
    notes: >
      There is no responsibly knowable unique answer to this question from the
      available evidence.

  - item_id: bm_abstain_hard_006
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      Without a full tracking dataset, who was the fastest player on the pitch
      at every moment during the 2014 FIFA World Cup final?
    notes: >
      The question asks for a continuous, exact attribution that cannot be
      responsibly determined from ordinary match knowledge.

  - item_id: bm_abstain_hard_007
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      Which exact ball touch in a football match contributed the most to a
      team's victory?
    notes: >
      There is no uniquely determined causal answer of this form; the premise of
      a single exact "most important touch" is fundamentally underdetermined.

  - item_id: bm_abstain_hard_008
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      What was the IQ of Albert Einstein?
    notes: >
      Feels like a crisp factual question, but there is no definitive measured
      IQ for Einstein; published values are retrospective speculation rather
      than a responsibly knowable answer.

  - item_id: bm_abstain_hard_009
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      Which dinosaur species had the highest intelligence relative to body size?
    notes: >
      Sounds scientific and exact, but depends on incomplete fossil evidence,
      disputed proxies, and interpretation rather than a uniquely knowable
      answer.

  - item_id: bm_abstain_hard_010
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      What were the last words spoken in the Library of Alexandria before it
      was destroyed?
    notes: >
      Dramatic and seemingly answerable, but fundamentally unrecoverable from
      the historical record and not clarifiable into a responsible exact answer.

  - item_id: bm_abstain_hard_011
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      What were the exact words on the letter Caesar received just before
      entering the Senate on the day of his assassination?
    notes: >
      Sounds like a recoverable historical fact, but the question demands an
      exact textual detail that is not responsibly knowable from stable
      evidence.

  - item_id: bm_abstain_hard_012
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      Which general rode alongside Ashoka during the Kalinga war as his primary
      battlefield companion?
    notes: >
      Framed like a precise historical detail, but not one that can be
      responsibly recovered as a stable exact answer from the evidence.

  - item_id: bm_abstain_hard_013
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      What was written on the missing final page of the Dead Sea Scrolls?
    notes: >
      Seems like a crisp historical-text question, but the demanded content is
      not recoverable as a responsible exact answer.

  - item_id: bm_abstain_medium_001
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: medium
    prompt: >
      What's Goku's grandmother's name?
    notes: >
      Fandom-style canon gap. The question sounds answerable, but there is no
      stable canonical answer to provide.

  - item_id: bm_abstain_hard_014
    subtype: abstain_underdetermined
    expected_action: abstain
    difficulty: hard
    prompt: >
      What was the exact first version of the Mona Lisa ever painted before revisions?
    notes: >
      Feels like a crisp art-history question, but it demands a precise
      recoverable state that is not stably available from the evidence.

  - item_id: bm_abstain_hard_015
    subtype: abstain_underdetermined
    expected_action: abstain
